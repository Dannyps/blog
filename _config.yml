# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Dannyps
email: blog-mail@dannyps.net
description: >- # this means to ignore newlines until "baseurl:"
  Sometimes we need to write things. And sometimes we wouldn't mind sharing those thing with the world.
  Sometime those things are interesting. When all those things are true, we publish them in a blog. Welcome to mine.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://blog.dannyps.net" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: dannyps97
github_username:  dannyps

# Build settings
theme: minima
plugins:
  - jekyll-feed

